name: CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build macOS app
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          set -euo pipefail
          swift --version
          xcodebuild -version

      - name: Run tests
        run: |
          set -euo pipefail
          env -u GIT_CONFIG_COUNT -u GIT_CONFIG_KEY_0 -u GIT_CONFIG_VALUE_0 swift test

      - name: Build app bundle
        run: ./script/build_app.sh

      - name: Verify app bundle
        run: |
          set -euo pipefail
          plutil -lint dist/Targie.app/Contents/Info.plist
          codesign --verify --deep --strict --verbose=2 dist/Targie.app
